[pytest]
# If the session hangs before collecting tests, a third-party autoloaded plugin
# can be the cause; set PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 for that environment.
testpaths = testing_suite
pythonpath = . apps/server
addopts = -q
filterwarnings =
    ignore::UserWarning
markers =
    requires_llm: needs OPENAI_API_KEY for DeepEval
