events {}

http {
  upstream aequitas_web {
    server web:3000;
  }

  upstream aequitas_api {
    server api:8000;
  }

  server {
    listen 80;
    server_name _;

    location /v1/ {
      proxy_pass http://aequitas_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://aequitas_web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
