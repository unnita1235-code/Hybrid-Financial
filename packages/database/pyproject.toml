[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aequitas-database"
version = "0.1.0"
description = "SQLAlchemy models, Alembic migrations, Supabase/Postgres + pgvector"
requires-python = ">=3.11"
dependencies = [
  "sqlalchemy>=2.0.36",
  "alembic>=1.14.0",
  "asyncpg>=0.30.0",
  "psycopg2-binary>=2.9.10",
  "pydantic-settings>=2.6.0",
  "pgvector>=0.3.0",
]

[project.optional-dependencies]
dev = ["ruff>=0.8.0", "pytest>=8.3.0"]

[tool.hatch.build.targets.wheel]
packages = ["aequitas_database"]

[tool.ruff]
line-length = 100
target-version = "py311"
