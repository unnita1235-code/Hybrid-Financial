name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main, develop]

jobs:
  validate-deploy-config:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required deployment secrets
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          set -euo pipefail
          required=(NETLIFY_AUTH_TOKEN NETLIFY_SITE_ID RENDER_API_KEY RENDER_SERVICE_ID FRONTEND_URL BACKEND_URL)
          missing=0
          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: ${key}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

  pre-deploy-checks:
    runs-on: ubuntu-latest
    needs: [validate-deploy-config]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install JS deps
        run: npm ci
      - name: Frontend lint
        run: npm run lint:web
      - name: Frontend build
        run: npm run build:web
      - name: Backend tests
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-local.txt
          pytest apps/server/tests -q --tb=line

  deploy-frontend-netlify:
    runs-on: ubuntu-latest
    needs: [pre-deploy-checks]
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm ci
      - name: Deploy frontend to Netlify (production)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NEXT_PUBLIC_AEQUITAS_API_URL: ${{ secrets.BACKEND_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          npx netlify-cli deploy \
            --build \
            --prod \
            --site "$NETLIFY_SITE_ID" \
            --message "GitHub Actions deploy ${GITHUB_SHA}"

  deploy-backend-render:
    runs-on: ubuntu-latest
    needs: [pre-deploy-checks]
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - name: Trigger Render deploy and wait for completion
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail
          deploy_response=$(curl --fail-with-body -sS \
            -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}')
          deploy_id=$(echo "$deploy_response" | jq -r '.id')
          if [ -z "$deploy_id" ] || [ "$deploy_id" = "null" ]; then
            echo "::error::Unable to parse Render deploy id"
            echo "$deploy_response"
            exit 1
          fi
          echo "Render deploy id: $deploy_id"
          echo "render_deploy_id=$deploy_id" >> "$GITHUB_ENV"

          max_attempts=60
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            status_response=$(curl --fail-with-body -sS \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${deploy_id}")
            status=$(echo "$status_response" | jq -r '.status')
            echo "Attempt $attempt/$max_attempts: status=$status"
            if [ "$status" = "live" ]; then
              exit 0
            fi
            if [ "$status" = "build_failed" ] || [ "$status" = "canceled" ] || [ "$status" = "update_failed" ]; then
              echo "::error::Render deploy failed with status=$status"
              echo "$status_response"
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep 10
          done
          echo "::error::Render deploy timed out"
          exit 1

  smoke-check:
    runs-on: ubuntu-latest
    needs: [deploy-frontend-netlify, deploy-backend-render]
    if: ${{ needs.deploy-frontend-netlify.result == 'success' && needs.deploy-backend-render.result == 'success' }}
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install chromium
      - name: Deployment smoke checks
        env:
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: npm run deploy:smoke
      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-smoke-artifacts
          path: artifacts/deploy-smoke
          if-no-files-found: warn

  rollback-on-failure:
    runs-on: ubuntu-latest
    needs: [deploy-frontend-netlify, deploy-backend-render, smoke-check]
    if: ${{ always() && (needs.deploy-frontend-netlify.result == 'failure' || needs.deploy-backend-render.result == 'failure' || needs.smoke-check.result == 'failure') }}
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      NETLIFY_LAST_KNOWN_GOOD_DEPLOY_ID: ${{ secrets.NETLIFY_LAST_KNOWN_GOOD_DEPLOY_ID }}
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    steps:
      - name: Attempt frontend rollback to last known good deploy
        if: ${{ env.NETLIFY_LAST_KNOWN_GOOD_DEPLOY_ID != '' }}
        run: |
          set -euo pipefail
          curl --fail-with-body -sS \
            -X POST \
            -H "Authorization: Bearer ${NETLIFY_AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.netlify.com/api/v1/sites/${NETLIFY_SITE_ID}/deploys/${NETLIFY_LAST_KNOWN_GOOD_DEPLOY_ID}/restore"
          echo "Triggered Netlify rollback."

      - name: Trigger backend redeploy as rollback fallback
        if: ${{ env.RENDER_API_KEY != '' && env.RENDER_SERVICE_ID != '' }}
        run: |
          set -euo pipefail
          curl --fail-with-body -sS \
            -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"clear"}'
          echo "Triggered Render rollback fallback redeploy."

      - name: Emit rollback summary
        run: |
          {
            echo "## Deployment failure handling"
            echo "- Frontend rollback attempted when NETLIFY_LAST_KNOWN_GOOD_DEPLOY_ID is configured."
            echo "- Backend rollback fallback triggered via fresh Render redeploy."
            echo "- Check provider dashboards and deploy-smoke-artifacts for detailed diagnostics."
          } >> "$GITHUB_STEP_SUMMARY"
