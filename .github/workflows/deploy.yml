name: Deploy (Cloudflare)

on:
  workflow_dispatch:
  push:
    branches: [main, develop]

jobs:
  validate-deploy-config:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required deployment secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          set -euo pipefail
          required=(CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID FRONTEND_URL BACKEND_URL)
          missing=0
          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: ${key}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

  pre-deploy-checks:
    runs-on: ubuntu-latest
    needs: [validate-deploy-config]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install JS deps
        run: npm ci
      - name: Frontend lint
        run: npm run lint:web
      - name: Frontend typecheck
        run: npm run typecheck:web
      - name: Frontend build
        run: npm run build:web
      - name: Worker typecheck
        run: npm run typecheck -w @aequitas/api-worker
      - name: Worker tests
        run: npm run test -w @aequitas/api-worker
      - name: Backend tests
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-local.txt
          pytest apps/server/tests -q --tb=line

  deploy-backend-worker:
    runs-on: ubuntu-latest
    needs: [pre-deploy-checks]
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm ci
      - name: Deploy Cloudflare Worker API
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          UPSTREAM_API_BASE: ${{ secrets.UPSTREAM_API_BASE }}
          APP_ENV: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
          ENVIRONMENT: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
        run: |
          npm run deploy -w @aequitas/api-worker -- --env ${{ github.ref_name == 'main' && 'production' || 'preview' }}

  pages-deploy-mode:
    runs-on: ubuntu-latest
    needs: [pre-deploy-checks]
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - name: Emit Pages deploy summary
        run: |
          {
            echo "## Cloudflare Pages deploy mode"
            echo "- Frontend deploys automatically via Cloudflare Pages Git integration."
            echo "- Branch mapping: main -> production, develop -> preview."
            echo "- This workflow validates quality gates before merge and deploy."
          } >> "$GITHUB_STEP_SUMMARY"

  smoke-check:
    runs-on: ubuntu-latest
    needs: [deploy-backend-worker, pages-deploy-mode]
    if: ${{ needs.deploy-backend-worker.result == 'success' && needs.pages-deploy-mode.result == 'success' }}
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install chromium
      - name: Deployment smoke checks
        env:
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: npm run deploy:smoke
      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-smoke-artifacts
          path: artifacts/deploy-smoke
          if-no-files-found: warn

  rollback-on-failure:
    runs-on: ubuntu-latest
    needs: [deploy-backend-worker, pages-deploy-mode, smoke-check]
    if: ${{ always() && (needs.deploy-backend-worker.result == 'failure' || needs.pages-deploy-mode.result == 'failure' || needs.smoke-check.result == 'failure') }}
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Attempt worker rollback to previous version
        run: |
          echo "Use Cloudflare dashboard rollback for Worker if smoke checks fail."
          echo "Pages rollback is managed in Cloudflare Pages deployment history."

      - name: Emit rollback summary
        run: |
          {
            echo "## Deployment failure handling"
            echo "- Frontend rollback: Cloudflare Pages deployment history."
            echo "- Backend rollback: Cloudflare Workers versions/rollback."
            echo "- Check provider dashboards and deploy-smoke-artifacts for detailed diagnostics."
          } >> "$GITHUB_STEP_SUMMARY"
