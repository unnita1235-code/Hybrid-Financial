# Automated Vercel production deploy for apps/web (monorepo root: npm ci + build:web).
# Add GitHub secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID (Vercel → Project → Settings → General).
name: Deploy frontend (Vercel)

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "package.json"
      - "package-lock.json"
      - "vercel.json"
  workflow_dispatch:

concurrency:
  group: vercel-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint web
        run: npm run lint:web

      - name: Typecheck web
        run: npm run typecheck:web

      - name: Build web
        run: npm run build:web

      - name: Deploy to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "::notice::Skip Vercel deploy: set VERCEL_TOKEN (and VERCEL_ORG_ID, VERCEL_PROJECT_ID) in repo secrets."
            exit 0
          fi
          npx vercel deploy --prod --yes --token "$VERCEL_TOKEN"
