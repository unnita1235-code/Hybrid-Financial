# Aequitas FI — CI aligned with portfolio spec: lint, tests, optional AI eval.
name: Aequitas AI pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ai-pipeline-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  web-lint-and-format:
    name: Prettier and ESLint (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install
        run: npm ci
      - name: Prettier (apps/web)
        run: npx prettier --check "apps/web/**/*.{ts,tsx,js,json,css,md}"
      - name: ESLint
        run: npm run lint:web

  python-tests:
    name: Pytest (backend + shared packages)
    runs-on: ubuntu-latest
    needs: [web-lint-and-format]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install workspace (editable, no per-app requirements.txt)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-local.txt
          pip install -r testing_suite/requirements.txt
      - name: Pytest
        run: pytest -m "not requires_llm"
      - name: Faithfulness demo
        run: python testing_suite/calculate_faithfulness.py --demo

  ai-evaluation:
    name: DeepEval RAG / SQL checks
    runs-on: ubuntu-latest
    needs: [python-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-local.txt
          pip install -r testing_suite/requirements.txt
      - name: DeepEval (requires OPENAI_API_KEY)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY not set; skipping DeepEval"
            exit 0
          fi
          pytest -q testing_suite/test_deepeval_sql_rag.py

  web-build:
    name: Next.js production build
    runs-on: ubuntu-latest
    needs: [web-lint-and-format]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install and build
        run: |
          npm ci
          npm run build:web

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for hardcoded secrets
        run: python testing_suite/verify_no_api_keys.py
      - name: Check auth_provider default is not "dev" in production config
        run: |
          if grep -n 'auth_provider.*=.*"dev"' apps/server/app/config.py; then
            echo "WARNING: auth_provider defaults to 'dev' — ensure ENVIRONMENT var is set in deployment"
          fi

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install and type-check
        working-directory: apps/web
        run: npm ci && npx tsc --noEmit

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install ruff
      - run: ruff check packages/ai-core packages/database apps/server --ignore E501
